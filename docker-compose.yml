services:
  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?set REDIS_PASSWORD in .env}
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

  kafka:
    image: apache/kafka:3.8.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://${KAFKA_ADVERTISED_HOST:-10.148.0.4}:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_HEAP_OPTS: "-Xmx256m -Xms128m"
    volumes:
      - kafka-data:/var/lib/kafka/data
    restart: unless-stopped

  topic-init:
    image: apache/kafka:3.8.0
    depends_on: [kafka]
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        sleep 10
        B=kafka:9092
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server $$B --create --if-not-exists \
          --topic embeddings    --partitions 1 --replication-factor 1 --config retention.ms=86400000
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server $$B --create --if-not-exists \
          --topic drift-signals --partitions 1 --replication-factor 1 --config retention.ms=604800000
    restart: "no"

  feast-server:
    build:
      context: .
      dockerfile: shared/feature-store/Dockerfile
    environment:
      REDIS_CONNECTION_STRING: ${REDIS_CONNECTION_STRING:?set REDIS_CONNECTION_STRING in .env}
    volumes:
      - ./shared/feature-store/data:/app/feature-store/data:ro
    ports:
      - "6566:6566"
    restart: unless-stopped

  drift-computer:
    build:
      context: .
      dockerfile: pipeline-monitoring/drift-computer-module/Dockerfile
    environment:
      FEAST_URL: ${FEAST_URL:-http://10.148.0.6:6566}
      KAFKA_BOOTSTRAP: ${KAFKA_BOOTSTRAP:-10.148.0.4:9092}
      INPUT_TOPIC: ${INPUT_TOPIC:-embeddings}
      OUTPUT_TOPIC: ${OUTPUT_TOPIC:-drift-signals}
      MODEL_VERSION: ${MODEL_VERSION:-bert_768}
      WINDOW_SIZE: ${WINDOW_SIZE:-500}
      METRICS_PORT: ${METRICS_PORT:-8000}
    ports:
      - "8000:8000"
    restart: unless-stopped

  producer:
    build:
      context: .
      dockerfile: pipeline-monitoring/producer-module/Dockerfile
    profiles: ["producer"]
    environment:
      GCP_PROJECT: ${GCP_PROJECT:-ta-driftmon-gana}
      BQ_DATASET: ${BQ_DATASET:-driftmon}
      EMBEDDINGS_TABLE: ${EMBEDDINGS_TABLE:-embeddings}
      KAFKA_BOOTSTRAP: ${KAFKA_BOOTSTRAP:-10.148.0.4:9092}
      TOPIC: ${TOPIC:-embeddings}
      SOURCE_SPLIT: ${SOURCE_SPLIT:-test}
      LABEL_FILTER: ${LABEL_FILTER:-}
      LIMIT: ${LIMIT:-0}
      RATE: ${RATE:-0}
      GOOGLE_APPLICATION_CREDENTIALS: /gcp/key.json
    volumes:
      - ./gcp-key.json:/gcp/key.json:ro
    restart: "no"

  prometheus:
    image: prom/prometheus:v2.53.0
    volumes:
      - ./shared/grafana/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.1.0
    depends_on: [prometheus]
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:?set GF_SECURITY_ADMIN_PASSWORD in .env}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_INSTALL_PLUGINS: "hamedkarbasi93-kafka-datasource"
    volumes:
      - ./shared/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:v1.8.2
    command: ["--path.rootfs=/host"]
    pid: host
    network_mode: host
    volumes:
      - /:/host:ro,rslave
    restart: unless-stopped

volumes:
  redis-data:
  kafka-data:
  prometheus-data:
  grafana-data:
